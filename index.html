<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#070B12"/>
<title>ERP Query AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:     #070B12;
  --panel:  #0D1320;
  --card:   #111927;
  --border: #1C2C40;
  --accent: #2970FF;
  --teal:   #0DC5A0;
  --text:   #C8D8EE;
  --muted:  #3D5470;
  --sans:   'DM Sans', system-ui, sans-serif;
  --mono:   'IBM Plex Mono', 'Courier New', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

#app { height: 100vh; display: flex; flex-direction: column; }

/* header */
#header {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#logo {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
  background: linear-gradient(135deg, #2970FF 0%, #7C5CFC 100%);
  display: flex; align-items: center; justify-content: center;
}
#header-info { flex: 1; min-width: 0; }
#app-title { font-size: 13px; font-weight: 700; letter-spacing: .12em; color: #D6E8FF; }
#file-status { font-size: 10px; color: var(--muted); font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
#upload-btn {
  display: flex; align-items: center; gap: 5px; padding: 6px 12px;
  border-radius: 7px; border: 1px solid var(--border); background: var(--card);
  color: var(--text); cursor: pointer; font-size: 11px; font-weight: 700;
  letter-spacing: .05em; white-space: nowrap; flex-shrink: 0;
  font-family: var(--sans); transition: border-color .15s;
}
#upload-btn:hover { border-color: var(--accent); }
#upload-btn.loaded { border-color: var(--teal); color: var(--teal); }

/* messages */
#messages { flex: 1; overflow-y: auto; padding: 16px 16px 8px; display: flex; flex-direction: column; gap: 14px; }

/* bubbles */
.bw { display: flex; gap: 9px; }
.bw.user { justify-content: flex-end; }
.av {
  width: 27px; height: 27px; border-radius: 7px; flex-shrink: 0; margin-top: 2px;
  background: linear-gradient(135deg, #2970FF 0%, #6C63FF 100%);
  display: flex; align-items: center; justify-content: center;
}
.bi { max-width: 88%; }
.bub { padding: 9px 13px; font-size: 13px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
.bub.ai  { background: var(--card); border: 1px solid var(--border); border-radius: 3px 11px 11px 11px; color: var(--text); }
.bub.usr { background: var(--accent); border: 1px solid transparent; border-radius: 11px 11px 3px 11px; color: #fff; }

/* thinking */
.thinking { display: flex; gap: 9px; align-items: center; }
.tdots { display: flex; gap: 6px; align-items: center; padding: 11px 15px; background: var(--card); border: 1px solid var(--border); border-radius: 3px 11px 11px 11px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1.2s ease infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }

/* table */
.rw { margin-top: 8px; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; }
.rtop { padding: 5px 12px; background: var(--panel); border-bottom: 1px solid var(--border); font-size: 10px; color: var(--muted); font-family: var(--mono); display: flex; justify-content: space-between; }
.rtop .cnt { color: var(--teal); }
.rscroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11px; font-family: var(--mono); }
thead th { padding: 7px 11px; text-align: left; border-bottom: 1px solid var(--border); color: var(--muted); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; background: var(--panel); }
tbody tr:nth-child(even) { background: #0D132070; }
tbody td { padding: 6px 11px; border-bottom: 1px solid #1C2C4018; color: var(--text); white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
tbody td.nl { color: var(--muted); }
.rfooter { padding: 6px 12px; border-top: 1px solid var(--border); display: flex; justify-content: center; align-items: center; gap: 8px; background: var(--panel); }
.pg { padding: 3px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; color: var(--text); cursor: pointer; font-size: 11px; font-family: var(--mono); }
.pg:disabled { opacity: .35; cursor: not-allowed; }
.nores { margin-top: 7px; padding: 7px 13px; background: var(--card); border: 1px solid var(--border); border-radius: 7px; font-size: 12px; color: var(--muted); font-style: italic; }

/* error */
#errbar { margin: 0 16px 6px; padding: 8px 14px; background: #EF444415; border: 1px solid #EF444430; border-radius: 7px; font-size: 12px; color: #F87171; display: none; align-items: center; justify-content: space-between; gap: 8px; }
#errbar.show { display: flex; }
#errcls { cursor: pointer; font-size: 18px; line-height: 1; }

/* footer */
#footer { padding: 8px 16px 14px; background: var(--panel); border-top: 1px solid var(--border); flex-shrink: 0; }
#iw { display: flex; gap: 7px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px 8px 14px; align-items: flex-end; transition: border-color .15s; }
#iw:focus-within { border-color: #2970FF50; }
#qi { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 13px; resize: none; font-family: var(--sans); line-height: 1.55; max-height: 100px; scrollbar-width: thin; }
#qi::placeholder { color: var(--muted); }
#btns { display: flex; gap: 5px; padding-bottom: 1px; flex-shrink: 0; }
.ib { width: 32px; height: 32px; border-radius: 7px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; background: var(--panel); color: var(--text); flex-shrink: 0; }
.ib:disabled { opacity: .3; cursor: not-allowed; }
.ib.ac { background: var(--accent); }
.ib.rec { animation: pulse 1.5s infinite; }
#hint { font-size: 10px; color: var(--muted); text-align: center; margin-top: 5px; font-family: var(--mono); }

@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes blink  { 0%,80%,100%{opacity:.25;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
@keyframes pulse  { 0%,100%{box-shadow:0 0 0 0 #2970FF40} 50%{box-shadow:0 0 0 7px transparent} }

@media(max-width:480px) {
  #header, #footer { padding-left: 12px; padding-right: 12px; }
  #messages { padding: 12px 12px 6px; }
  .bi { max-width: 94%; }
}
</style>
</head>
<body>
<div id="app">

  <header id="header">
    <div id="logo">
      <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <ellipse cx="12" cy="5" rx="9" ry="3"/>
        <path d="M3 5v7c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
        <path d="M3 12v7c0 1.66 4.03 3 9 3s9-1.34 9-3v-7"/>
      </svg>
    </div>
    <div id="header-info">
      <div id="app-title">ERP QUERY AI</div>
      <div id="file-status">nessun dataset caricato</div>
    </div>
    <button id="upload-btn" onclick="document.getElementById('fi').click()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
      </svg>
      CARICA EXCEL
    </button>
    <input id="fi" type="file" accept=".xlsx,.xls,.csv" style="display:none"/>
  </header>

  <div id="messages"></div>

  <div id="errbar">
    <span id="errtxt"></span>
    <span id="errcls" onclick="hideErr()">×</span>
  </div>

  <footer id="footer">
    <div id="iw">
      <textarea id="qi" rows="1" placeholder="Carica prima un file Excel…" disabled></textarea>
      <div id="btns">
        <button class="ib" id="micbtn" onclick="toggleVoice()" disabled title="Dettatura vocale">
          <svg id="micico" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/>
          </svg>
        </button>
        <button class="ib ac" id="sndbtn" onclick="send()" disabled title="Invia">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="hint">Invio per inviare · Shift+Invio per nuova riga</div>
  </footer>
</div>

<script>
let DATA=[], COLS=[], BUSY=false, REC=false, recObj=null, mid=0;

const $msgs  = document.getElementById('messages');
const $qi    = document.getElementById('qi');
const $snd   = document.getElementById('sndbtn');
const $mic   = document.getElementById('micbtn');
const $stat  = document.getElementById('file-status');
const $upbtn = document.getElementById('upload-btn');
const $hint  = document.getElementById('hint');
const $err   = document.getElementById('errbar');
const $etxt  = document.getElementById('errtxt');

// Welcome
window.addEventListener('DOMContentLoaded', () => {
  addAI('Ciao! Carica un file Excel per iniziare.\nFammi domande sui dati, ad esempio:\n\n• "clienti di Milano con importo > 500"\n• "ordina per importo decrescente"\n• "quanti record per ogni stato?"\n• "raggruppa per categoria e somma"');
});

// Input auto-resize
$qi.addEventListener('input', () => {
  $qi.style.height = 'auto';
  $qi.style.height = Math.min($qi.scrollHeight, 100) + 'px';
  $snd.disabled = BUSY || !$qi.value.trim() || !DATA.length;
});
$qi.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } });

function showErr(m) { $etxt.textContent = m; $err.classList.add('show'); }
function hideErr()  { $err.classList.remove('show'); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br/>');
}
function scrollBot() { $msgs.scrollTop = $msgs.scrollHeight; }

const AVT = `<div class="av"><svg width="13" height="13" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v7c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12v7c0 1.66 4.03 3 9 3s9-1.34 9-3v-7"/></svg></div>`;

function addAI(text, results) {
  const w = document.createElement('div');
  w.className = 'bw'; w.style.animation = 'fadeUp .22s ease';
  w.innerHTML = `${AVT}<div class="bi"><div class="bub ai">${esc(text)}</div></div>`;
  $msgs.appendChild(w);
  if (results !== undefined) {
    const inner = w.querySelector('.bi');
    if (results.length === 0) {
      const n = document.createElement('div'); n.className='nores'; n.textContent='Nessun risultato trovato';
      inner.appendChild(n);
    } else {
      inner.appendChild(buildTable(results));
    }
  }
  scrollBot();
}

function addUser(text) {
  const w = document.createElement('div');
  w.className = 'bw user'; w.style.animation = 'fadeUp .22s ease';
  w.innerHTML = `<div class="bi"><div class="bub usr">${esc(text)}</div></div>`;
  $msgs.appendChild(w); scrollBot();
}

function addThinking() {
  const el = document.createElement('div');
  el.className = 'thinking'; el.id = 'thinking';
  el.innerHTML = `${AVT}<div class="tdots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  $msgs.appendChild(el); scrollBot();
}
function rmThinking() { document.getElementById('thinking')?.remove(); }

// Paginated table
function buildTable(rows) {
  const PER = 10, keys = Object.keys(rows[0]);
  let page = 0;
  const pages = Math.ceil(rows.length / PER);
  const wrap = document.createElement('div'); wrap.className = 'rw';
  const render = () => {
    const slice = rows.slice(page*PER, (page+1)*PER);
    wrap.innerHTML = `
      <div class="rtop">
        <span><span class="cnt">${rows.length}</span> ${rows.length===1?'riga':'righe'}</span>
        ${pages>1?`<span>${page+1}/${pages}</span>`:''}
      </div>
      <div class="rscroll"><table>
        <thead><tr>${keys.map(k=>`<th>${k}</th>`).join('')}</tr></thead>
        <tbody>${slice.map(r=>`<tr>${keys.map(k=>{
          const v=r[k]; const e=v===undefined||v==='';
          return `<td class="${e?'nl':''}">${e?'—':esc(String(v))}</td>`;
        }).join('')}</tr>`).join('')}</tbody>
      </table></div>
      ${pages>1?`<div class="rfooter">
        <button class="pg" id="pp" ${page===0?'disabled':''}>← Prec</button>
        <span style="font-size:10px;color:var(--muted);font-family:var(--mono)">${page+1}/${pages}</span>
        <button class="pg" id="np" ${page===pages-1?'disabled':''}>Succ →</button>
      </div>`:''}`;
    if (pages>1) {
      wrap.querySelector('#pp')?.addEventListener('click', ()=>{page--;render();});
      wrap.querySelector('#np')?.addEventListener('click', ()=>{page++;render();});
    }
  };
  render(); return wrap;
}

// File upload
document.getElementById('fi').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  hideErr();
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb   = XLSX.read(ev.target.result, {type:'binary'});
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, {defval:''});
      if (!data.length) { showErr('File vuoto o non leggibile.'); return; }
      DATA = data; COLS = Object.keys(data[0]);
      $stat.textContent = `${file.name} — ${DATA.length} righe · ${COLS.length} colonne`;
      $upbtn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg> CAMBIA FILE`;
      $upbtn.classList.add('loaded');
      $qi.disabled = false;
      $qi.placeholder = 'es. "clienti di Roma con importo > 500"…';
      $mic.disabled = false;
      $snd.disabled = true;
      $hint.textContent = `Invio per inviare · Shift+Invio per nuova riga · ${DATA.length} record in memoria`;
      addAI(`✓ File caricato: ${file.name}\n${DATA.length} righe · ${COLS.length} colonne\n\nColonne: ${COLS.join(', ')}\n\nFammi una domanda!`);
    } catch { showErr('Errore nel file. Assicurati sia un Excel valido.'); }
  };
  reader.readAsBinaryString(file); this.value='';
});

// Voice
function toggleVoice() {
  if (REC) { recObj?.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showErr('Riconoscimento vocale non supportato. Usa Chrome.'); return; }
  const r = new SR();
  r.lang='it-IT'; r.continuous=false; r.interimResults=false;
  r.onstart = () => { REC=true; setMic(true); };
  r.onend   = () => { REC=false; setMic(false); };
  r.onerror = () => { REC=false; setMic(false); };
  r.onresult = ev => {
    const t = ev.results[0][0].transcript;
    $qi.value += ($qi.value?' ':'')+t;
    $qi.style.height='auto'; $qi.style.height=Math.min($qi.scrollHeight,100)+'px';
    $snd.disabled = BUSY||!$qi.value.trim()||!DATA.length;
  };
  recObj=r; r.start();
}
function setMic(on) {
  $mic.classList.toggle('rec', on);
  $mic.innerHTML = on
    ? `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23M12 19v3M8 22h8"/></svg>`
    : `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/></svg>`;
}

// Send
async function send() {
  const q = $qi.value.trim();
  if (!q || BUSY || !DATA.length) return;
  hideErr();
  $qi.value=''; $qi.style.height='auto';
  addUser(q);
  BUSY=true; $snd.disabled=true; $mic.disabled=true;
  addThinking();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ cols:COLS, sample:DATA.slice(0,3), query:q, data:DATA }),
    });
    const body = await res.json();
    if (!res.ok || body.error) throw new Error(body.error || `HTTP ${res.status}`);
    rmThinking();
    addAI(body.summary, body.results);
  } catch(e) {
    rmThinking();
    addAI('Errore: ' + (e.message || 'risposta non valida dal server.'));
    console.error(e);
  }

  BUSY=false; $mic.disabled=false; $snd.disabled=!$qi.value.trim();
}
</script>
</body>
</html>
